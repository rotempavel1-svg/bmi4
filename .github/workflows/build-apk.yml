name: Build APK

# Triggers: every push to main/master, every PR, and manual trigger.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthTracker-debug-${{ github.run_number }}
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      # Auto-attach the APK to a GitHub Release when a tag like v1.0 is pushed.
      - name: Create Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.apk_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
