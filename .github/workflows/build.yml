name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install Gradle 8.5
      run: |
        GRADLE_VERSION=8.5
        wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt
        echo "/opt/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

    - name: Build Debug APK
      run: /opt/gradle-8.5/bin/gradle assembleDebug --no-daemon --stacktrace

    - name: Rename APK
      run: cp app/build/outputs/apk/debug/app-debug.apk HealthTracker.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HealthTracker-APK
        path: HealthTracker.apk
        retention-days: 30
